<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <div class="card">
      <img
        src="./assets/images/illustration-article.svg"
        alt="card_img"
        class="card_img"
      />
      <div class="card_body">
        <div class="card_type">Learning</div>
        <h5>Published 21 Dec 2023</h5>
        <h3 class="card_title">HTML & CSS foundations</h3>
        <h5 class="card_content">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </h5>
        <div class="card_avatar">
          <img
            src="./assets/images/image-avatar.webp"
            alt="avatar"
            class="avatar_img"
          />
          <h5 class="avatar_name">Greg Hooper</h5>
        </div>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
